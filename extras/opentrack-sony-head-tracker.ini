; Sample OpenTrack profile for Sony Head Tracker for Windows
; ==========================================================
; Sony Head Tracker streams six little-endian doubles (x, y, z, yaw, pitch, roll)
; to UDP 127.0.0.1:4242, so OpenTrack's "UDP over network" input reads it directly.
;
; This file is a STARTING POINT. OpenTrack rewrites profiles in its own key layout
; when you save, and exact keys vary by OpenTrack version, so the reliable path is:
;
;   1. Open OpenTrack.
;   2. Input:  choose  "UDP over network"  ->  Settings  ->  Port = 4242.
;   3. Output: choose your game's protocol (e.g. "freetrack 2.0 Enhanced",
;              "SimConnect" for MSFS, or "UDP over network" to another app).
;   4. Leave translation (x/y/z) unmapped — this project reports orientation only.
;   5. Map Yaw / Pitch / Roll and tune the curves to taste, then press Start.
;
; Start the bridge first (or just leave the Sony Head Tracker GUI open), then
; press Start in OpenTrack.

[modules]
tracker-model=UDP over network

[udp-receiver]
port=4242
